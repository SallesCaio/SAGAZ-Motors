<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D00000;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#D00000;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <ellipse cx="300" cy="200" rx="200" ry="150" fill="url(#glow)"/>
  <!-- Silhueta de moto simplificada -->
  <circle cx="200" cy="280" r="60" fill="#333" stroke="#D00000" stroke-width="2"/>
  <circle cx="400" cy="280" r="60" fill="#333" stroke="#D00000" stroke-width="2"/>
  <path d="M200,220 Q300,150 400,220" fill="none" stroke="#D00000" stroke-width="3"/>
  <text x="300" y="100" text-anchor="middle" fill="#D00000" font-family="Montserrat, sans-serif" font-size="36" font-weight="800">M400</text>
  <text x="300" y="130" text-anchor="middle" fill="#666" font-family="Inter, sans-serif" font-size="14">SCOOTER ELÉTRICA</text>
  <!-- Linhas de velocidade -->
  <line x1="50" y1="200" x2="150" y2="200" stroke="#D00000" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="220" x2="180" y2="220" stroke="#D00000" stroke-width="2" opacity="0.3"/>
  <line x1="60" y1="180" x2="130" y2="180" stroke="#D00000" stroke-width="2" opacity="0.4"/>
</svg>